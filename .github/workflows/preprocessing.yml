name: Data Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'preprocessing/automate_Azzahra.py'
      - 'heart_raw.csv'
      - 'requirements.txt'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Verify data files
      run: |
        echo "Checking for required files..."
        ls -lah
        if [ ! -f "heart_raw.csv" ]; then
          echo "Error: heart_raw.csv not found!"
          exit 1
        fi
        echo "heart_raw.csv found"

    - name: Run preprocessing
      run: |
        echo "Starting preprocessing pipeline..."
        python preprocessing/automate_Azzahra.py

    - name: Upload preprocessed CSV as artifact
      uses: actions/upload-artifact@v4
      with:
        name: preprocessed-data-${{ github.run_number }}
        path: heart_preprocessing/*.csv
        retention-days: 30

    - name: Commit and push updated preprocessed data
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git add heart_preprocessing/*.csv
        git commit -m "Update preprocessing outputs (run ${{ github.run_number }})" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
