name: Data Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'preprocessing/automate_Azzahra.py'
      - 'heart_raw.csv'
      - 'requirements.txt'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Verify data files
      run: |
        echo "Checking for required files..."
        ls -lah
        if [ ! -f "heart_raw.csv" ]; then
          echo "Error: heart_raw.csv not found!"
          exit 1
        fi
        echo "✓ heart_raw.csv found"
    
    - name: Run preprocessing
      run: |
        echo "Starting preprocessing pipeline..."
        cd preprocessing
        python automate_Azzahra.py
        
    - name: Upload processed data as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: processed-data-${{ github.run_number }}
        path: |
          preprocessing/heart_preprocessing/*.csv
        retention-days: 30
        
    - name: Commit and push processed data to repository
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Pull latest changes
        git pull --rebase origin ${{ github.ref_name }} || true
        
        # Add all CSV files in the output folder
        git add preprocessing/heart_preprocessing/*.csv
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "✓ No changes to commit"
        else
          git commit -m "Auto-update: Processed data from run #${{ github.run_number }}"
          git push origin HEAD:${{ github.ref_name }}
          echo "✓ Changes pushed successfully!"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}